# 한국어 → YouTube 카테고리 lexicon.
#
# 카테고리 이름은 YouTube videoCategories.list (regionCode=KR, hl=en_US) 의
# title 과 정확히 같다 — feed-builder 의 NAME_TO_CATEGORY_ID 매핑과 동일 namespace.
