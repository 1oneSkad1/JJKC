# 매칭 규칙(lib/classify.ts):
#   - 키워드는 소문자, 한글 그대로 비교
#   - 채널 description + 최근 영상 title 들을 합친 텍스트에서 substring 검색
#   - 동률은 weight 의 합으로 결정. weight 기본 1, 강한 시그널은 2~3
#   - 마지막에 normalizeTopN 으로 0-100 로 정규화

